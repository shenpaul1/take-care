<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照顧者心靈雞湯 - 薰衣草之聲</title>
    <style>
        :root {
            --bg-color: #F3E5F5;
            --primary-purple: #9575CD;
            --dark-purple: #5E35B1;
            --accent-purple: #D1C4E9;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #F3E5F5 0%, #E1BEE7 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: var(--dark-purple);
            overflow: hidden;
        }

        /* 音樂切換按鈕 */
        #music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid white;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        #music-btn:hover { transform: scale(1.1); background: white; }

        .card {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px 25px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(103, 58, 183, 0.15);
            text-align: center;
            max-width: 380px;
            width: 100%;
            border: 2px solid white;
            backdrop-filter: blur(8px);
            position: relative;
        }

        .icon { font-size: 2.5rem; margin-bottom: 15px; display: block; }
        h1 { font-size: 1.25rem; color: var(--dark-purple); margin-bottom: 25px; letter-spacing: 1.5px; }

        #quote-container {
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }

        #quote {
            font-size: 1.15rem;
            line-height: 1.8;
            font-weight: 500;
            color: #4527A0;
            transition: opacity 0.6s ease;
        }

        button.main-btn {
            background-color: var(--primary-purple);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.05rem;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(149, 117, 205, 0.4);
            transition: all 0.3s ease;
            width: 85%;
        }

        button.main-btn:hover { background-color: var(--dark-purple); }

        footer { margin-top: 30px; font-size: 0.75rem; color: #7E57C2; opacity: 0.6; }
    </style>
</head>
<body>

<audio id="bgm" loop>
    <source src="bgm.mp3" type="audio/mpeg">
</audio>

<button id="music-btn" onclick="toggleMusic()">🔇</button>

<div class="card">
    <span class="icon">🪻</span>
    <h1>親愛的，請給自己一點空間</h1>
    
    <div id="quote-container">
        <div id="quote">正在為你準備溫暖...</div>
    </div>

    <button class="main-btn" onclick="getNewQuote()">抽取下一份溫暖</button>

    <footer>薰衣草小站 ‧ 陪你深呼吸</footer>
</div>

<script>
    // 音樂控制
    const bgm = document.getElementById('bgm');
    const musicBtn = document.getElementById('music-btn');
    let isPlaying = false;

    function toggleMusic() {
        if (isPlaying) {
            bgm.pause();
            musicBtn.innerText = "🔇";
        } else {
            bgm.play();
            musicBtn.innerText = "🔊";
        }
        isPlaying = !isPlaying;
    }

    // 語錄資料庫 (預留 500 句位置)
    let quotes = [
        "你現在所做的一切，是這世界上最溫柔的承擔。", "你的陪伴，就是最良效的藥方。", "不一定要做到完美，你的用心就是最好的照顧。", 
        "因為有你，這段路才不顯得那麼孤單。", "你可以累，這完全沒有問題。", "不完美也沒關係，你已經盡力了。",
        "今天沒做完的事，就留給明天吧。", "你是照顧者，也是需要被呵護的孩子。", "哭出來也沒關係，眼淚能洗滌壓力。",
        "現在，請跟我一起深呼吸：吸氣，吐氣。", "閉上眼，讓肩膀放鬆三秒鐘。", "把手放在心口，感受自己的心跳。",
        "每一口呼吸，都是在為自己充電。", "今天的挑戰已過期，請領取明天的勇氣。", "你是光，即便在陰影中也依然閃耀。"
        // ... 此處可持續貼入您之前的語錄
        // --- 類別一：自我肯定與價值 ---
    "你現在所做的一切，是這世界上最溫柔的承擔。",
    "你的陪伴，就是最良效的藥方。",
    "不一定要做到完美，你的用心就是最好的照顧。",
    "因為有你，這段路才不顯得那麼孤單。",
    "你是一個充滿愛與力量的人，請為自己感到驕傲。",
    "今天的你，也辛苦了，你真的做得很好。",
    
    // --- 類別二：情緒接納與減壓 ---
    "累了就停下來喘口氣，世界不會因為你休息而崩塌。",
    "有情緒是正常的，照顧者也需要被照顧。",
    "流淚並不代表軟弱，而是心靈正在排毒。",
    "給自己一個擁抱，告訴自己：『辛苦了，謝謝你。』",
    "不需要隨時都保持堅強，偶爾示弱也沒關係。",
    "放下對完美的執著，那是對自己最大的慈悲。",

    // --- 類別三：生活的小確幸 ---
    "喝口水，深呼吸，感受空氣進入肺部的平靜。",
    "看窗外的一朵雲，讓心跟著它飄一會兒。",
    "這分鐘，請只留給你自己。",
    "聽一首喜歡的歌，讓旋律帶走你的疲憊。",
    "陽光依舊會升起，你並不孤單。",

    // --- 類別四：長跑的智慧 ---
    "照顧是一場馬拉松，配速比衝刺更重要。",
    "先把自己的杯子裝滿，才有餘裕分享給別人。",
    "拒絕不合理的要求，是為了走更長遠的路。",
    "尋求幫助不是失敗，而是智慧的展現。",
    "小小的進步也是進步，值得為此慶祝。",
    
    // --- 類別五：對未來的期許 ---
    "這段艱難的時光，終將成為你生命中堅韌的勳章。",
    "所有的付出，都會以另一種形式回到你身邊。",
    "願你心中始終有一盞燈，照亮自己，也溫暖他人。",
    "過好今天，就是對未來最好的交代。"

    // --- 呼吸與當下 (1-40) ---
    "現在，請跟我一起深呼吸：吸氣，吐氣。", "閉上眼，讓肩膀放鬆三秒鐘。", "這分鐘，你只需要照顧你的呼吸。", "感覺腳掌踩在地板上的踏實感。", "把手放在心口，感受自己的心跳。", "壓力像雲，會飄過，不會永遠停留。", "現在的你，是安全的，放鬆下來。", "吐氣時，想像把所有的緊繃都吐出去。", "試著放空大腦，只聽周圍的聲音。", "你不需要現在就解決所有問題。",
    "慢慢來，比較快。", "專注於當下這一刻，不要想明天。", "給自己一個長長的、安靜的深呼吸。", "現在，放下手機，閉眼休息一分鐘吧。", "你的身體需要你的溫柔對待。", "放鬆眉心，那裡不需要鎖得那麼緊。", "現在，你是自由的，心靈是自由的。", "想像一道暖光，從頭頂緩緩流向全身。", "讓思緒像溪水一樣流過，不要抓著它。", "不需要強求平靜，接受現在的焦躁也可以。",
    "給辛苦的雙手一點按摩吧。", "暫時關掉腦中的廣播電台。", "每一口呼吸，都是在為自己充電。", "你做得很好了，真的。", "現在，試著微笑一下，肌肉會放鬆的。", "壓力是提醒你該抱抱自己了。", "喝一口溫水，感受它流過喉嚨的溫度。", "允許自己在這個瞬間，什麼都不做。", "你的疲累，值得被溫柔地看見。", "世界轉得很快，但你可以慢下來。",
    "深呼吸，讓空氣填滿你的腹部。", "這分鐘，沒有人會要求你做什麼。", "把重擔暫時放在門外，進來休息吧。", "感受空氣的涼爽，感受身體的重量。", "你是活生生的人，不是運轉的機器。", "放鬆你的牙關，別咬得那麼緊。", "這一刻，你是被愛著與支持著的。", "讓肩膀自然下垂，卸下那無形的擔子。", "你是宇宙中獨一無二的奇蹟。", "安靜下來，聽聽內心的聲音。",

        
    ];

    // 自動填充到 500 句 (這是一個範例，確保陣列長度)
    //const extraQuotes = ["深呼吸，感受當下的平靜。", "照顧好自己，你才有力量照顧別人。", "你是這段旅程中最勇敢的人。", "給自己一個微笑，你做得很棒。"];
    while (quotes.length < 1000) {
        quotes.push(...extraQuotes);
    }

    function getNewQuote() {
        const quoteElement = document.getElementById('quote');
        quoteElement.style.opacity = 0;
        
        // 如果音樂還沒播，第一次點擊按鈕時順便啟動音樂 (使用者體驗優化)
        if (!isPlaying) {
            // toggleMusic(); // 如果想強制啟動可取消註解
        }

        setTimeout(() => {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            quoteElement.innerText = quotes[randomIndex];
            quoteElement.style.opacity = 1;
        }, 600);
    }

    window.onload = getNewQuote;
</script>

</body>
</html>
